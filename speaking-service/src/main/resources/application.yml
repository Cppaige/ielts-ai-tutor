server:
  port: 8082

spring:
  application:
    name: speaking-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/ielts_speaking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:ielts}
    password: ${MYSQL_PASSWORD:ielts123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: speaking-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.ielts.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  ai:
    openai:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:changeme}
      chat:
        options:
          model: deepseek-v4-pro

data-service:
  base-url: ${DATA_SERVICE_URL:http://localhost:8083}

aliyun:
  nls:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:changeme}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:changeme}
    app-key: ${ALIYUN_NLS_APP_KEY:changeme}
